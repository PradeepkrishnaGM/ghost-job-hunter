name: Job Scraper Automation

on:
  schedule:
    - cron: '0 */5 * * *' # Runs exactly every 5 hours
  workflow_dispatch: # Adds a button so you can run it manually on GitHub!

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests feedparser beautifulsoup4 python-dateutil supabase

      - name: Run Scraper Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper.py
